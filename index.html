<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keuning Fotografie | Under Construction</title>
    <style>
        /* Kleurstelling: Charcoal & Sage */
        :root {
            --charcoal: #5d5652;
            --sage: #a8b39b;
            --bg-warm: #f5f5f4; /* Zachte, warme achtergrondkleur */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-warm);
            color: var(--charcoal);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .construction-container {
            max-width: 500px;
            width: 100%;
        }

        .logo-wrapper {
            margin-bottom: 40px;
        }

        .logo-wrapper img {
            width: 100%;
            max-width: 320px; /* Net iets groter voor een mooie balans op een lege pagina */
            height: auto;
            display: inline-block;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--charcoal);
            margin-bottom: 15px;
            position: relative;
            padding-bottom: 15px;
        }

        /* Subtiel Sage-kleurig streepje onder de tekst */
        h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background-color: var(--sage);
            border-radius: 2px;
        }

        p {
            font-size: 16px;
            color: #77726f;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="construction-container">
        <div class="logo-wrapper">
            <img src="Keuning Fotografie logo klein.png" alt="Keuning Fotografie Logo">
        </div>
        
        <h1>Under Construction</h1>
        <p>Aan onze nieuwe website wordt momenteel hard gewerkt. Binnenkort online!</p>
    </div>

</body>
</html>
